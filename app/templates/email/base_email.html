<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Contract Sync{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif; -webkit-font-smoothing: antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f5; padding: 32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

          <!-- 헤더 -->
          <tr>
            <td style="background-color: #4F46E5; padding: 24px 32px; border-radius: 12px 12px 0 0; text-align: center;">
              <span style="color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: 0.5px;">Contract Sync</span>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="background-color: #ffffff; padding: 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="background-color: #f9fafb; padding: 20px 32px; border-radius: 0 0 12px 12px; border-top: 1px solid #e5e7eb;">
              <p style="margin: 0; color: #9ca3af; font-size: 12px; text-align: center; line-height: 1.6;">
                Contract Sync &mdash; 프로젝트 관리 플랫폼<br>
                본 메일은 발신 전용입니다. 회신하지 마세요.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
