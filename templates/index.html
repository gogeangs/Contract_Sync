<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="/static/js/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

<!-- Toast -->
<div x-data="toastManager()" x-init="window._toast.ready=true;window._toast._queue.forEach(q=>show(q.message,q.type));window._toast._queue=[];" @toast.window="show($event.detail.message,$event.detail.type)" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none" style="max-width:400px;" role="status" aria-live="polite">
    <template x-for="t in toasts" :key="t.id">
        <div x-show="t.visible" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0 translate-x-8" class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg text-sm" :class="{'bg-green-50 border border-green-200 text-green-800 dark:bg-green-900/30 dark:border-green-800 dark:text-green-300': t.type==='success','bg-red-50 border border-red-200 text-red-800 dark:bg-red-900/30 dark:border-red-800 dark:text-red-300': t.type==='error','bg-yellow-50 border border-yellow-200 text-yellow-800 dark:bg-yellow-900/30 dark:border-yellow-800 dark:text-yellow-300': t.type==='warning','bg-blue-50 border border-blue-200 text-blue-800 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-300': t.type==='info'}">
            <span x-text="t.message" class="flex-1"></span>
            <button @click="dismiss(t.id)" class="ml-2 opacity-60 hover:opacity-100">&times;</button>
        </div>
    </template>
</div>

<!-- App Shell -->
<div x-data="appShell()" x-cloak class="flex h-screen overflow-hidden">

    <!-- 로딩 -->
    <template x-if="loading">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-gray-900">
            <div class="flex flex-col items-center gap-3">
                <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <span class="text-sm text-gray-500">로딩 중...</span>
            </div>
        </div>
    </template>

    <!-- 데스크톱 사이드바 -->
    <aside x-show="currentPage !== 'feedback'" class="hidden lg:flex lg:flex-col w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 fixed inset-y-0 left-0 z-30">
        <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-200 dark:border-gray-700">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <span class="text-lg font-bold text-gray-800 dark:text-white">Contract Sync</span>
        </div>
        <div class="px-4 py-3" x-show="user">
            <button @click="teamDropdown=!teamDropdown" class="w-full flex items-center justify-between px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="text-gray-700 dark:text-gray-200" x-text="selectedTeamLabel"></span>
                </div>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="teamDropdown" @click.away="teamDropdown=false" x-cloak class="mt-1 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 z-50 overflow-hidden">
                <button @click="switchTeam(null)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200">개인</button>
                <template x-for="tm in teams" :key="tm.id||tm.team_id">
                    <button @click="switchTeam(tm.id||tm.team_id)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200" x-text="tm.name"></button>
                </template>
            </div>
        </div>
        <nav class="flex-1 px-3 py-2 space-y-1 overflow-y-auto">
            <a href="#/dashboard" @click.prevent="navigate('/dashboard')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='dashboard'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>대시보드</span>
            </a>
            <a href="#/clients" @click.prevent="navigate('/clients')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='clients'||currentPage==='clientDetail'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg><span>발주처</span>
            </a>
            <a href="#/projects" @click.prevent="navigate('/projects')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='projects'||currentPage==='projectDetail'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><span>프로젝트</span>
            </a>
            <a href="#/tasks" @click.prevent="navigate('/tasks')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='tasks'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span>업무</span>
            </a>
            <a href="#/reports" @click.prevent="navigate('/reports')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='reports'||currentPage==='reportEditor'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>보고서</span>
            </a>
            <a href="#/payments" @click.prevent="navigate('/payments')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='payments'||currentPage==='estimate'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span>수금</span>
            </a>
            <a href="#/templates" @click.prevent="navigate('/templates')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors" :class="currentPage==='templates'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg><span>템플릿</span>
            </a>
        </nav>
        <div class="px-3 py-3 border-t border-gray-200 dark:border-gray-700">
            <a href="#/settings" @click.prevent="navigate('/settings')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>설정</span>
            </a>
        </div>
    </aside>

    <!-- 모바일 사이드바 -->
    <div x-show="sidebarOpen" x-cloak @click="sidebarOpen=false" class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"></div>
    <aside x-show="sidebarOpen" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full" class="fixed inset-y-0 left-0 w-64 bg-white dark:bg-gray-800 z-50 lg:hidden shadow-xl">
        <div class="flex items-center justify-between px-6 py-5 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-3"><div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><span class="text-lg font-bold">Contract Sync</span></div>
            <button @click="sidebarOpen=false" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <nav class="px-3 py-4 space-y-1">
            <a href="#/dashboard" @click.prevent="navigate('/dashboard')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" :class="currentPage==='dashboard'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300'"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>대시보드</span></a>
            <a href="#/clients" @click.prevent="navigate('/clients')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" :class="currentPage==='clients'||currentPage==='clientDetail'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300'"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg><span>발주처</span></a>
            <a href="#/projects" @click.prevent="navigate('/projects')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" :class="currentPage==='projects'||currentPage==='projectDetail'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300'"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><span>프로젝트</span></a>
            <a href="#/tasks" @click.prevent="navigate('/tasks')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" :class="currentPage==='tasks'?'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium':'text-gray-600 dark:text-gray-300'"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span>업무</span></a>
        </nav>
    </aside>

    <!-- 메인 영역 -->
    <div class="flex-1 flex flex-col overflow-hidden" :class="currentPage !== 'feedback' && currentPage !== 'portal' ? 'lg:ml-64' : ''">
        <!-- 헤더 -->
        <header x-show="currentPage !== 'feedback' && currentPage !== 'portal'" class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 lg:px-6 py-3 flex items-center justify-between sticky top-0 z-20">
            <div class="flex items-center gap-3">
                <button @click="sidebarOpen=!sidebarOpen" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
                <h1 class="text-lg font-semibold" x-text="{'dashboard':'대시보드','clients':'발주처','clientDetail':'발주처 상세','projects':'프로젝트','projectDetail':'프로젝트 상세','tasks':'업무','reports':'보고서','reportEditor':'보고서 편집','payments':'수금 관리','estimate':'AI 견적서','templates':'템플릿 관리','settings':'설정'}[currentPage]||'대시보드'"></h1>
            </div>
            <div class="flex items-center gap-2">
                <template x-if="user">
                    <div class="relative">
                        <button @click="toggleNotifications()" class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                            <span x-show="unreadCount>0" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[10px] rounded-full flex items-center justify-center" x-text="unreadCount>9?'9+':unreadCount"></span>
                        </button>
                        <div x-show="showNotifPanel" @click.away="showNotifPanel=false" x-cloak class="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 z-50">
                            <div class="flex items-center justify-between p-3 border-b border-gray-100 dark:border-gray-700"><span class="font-semibold text-sm">알림</span><button @click="markAllNotifRead()" class="text-xs text-indigo-600 hover:underline">모두 읽음</button></div>
                            <div class="max-h-64 overflow-y-auto">
                                <template x-if="notifications.length===0"><p class="text-center text-sm text-gray-400 py-8">알림이 없습니다.</p></template>
                                <template x-for="n in filteredNotifications" :key="n.id">
                                    <div @click="markNotifRead(n.id)" class="px-3 py-2.5 border-b border-gray-50 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer" :class="!n.is_read?'bg-indigo-50/50 dark:bg-indigo-900/10':''">
                                        <p class="text-sm" x-text="n.message"></p><p class="text-xs text-gray-400 mt-1" x-text="formatRelativeTime(n.created_at)"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                <button @click="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                    <svg x-show="!darkMode" class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg x-show="darkMode" x-cloak class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
                <template x-if="user">
                    <div class="relative flex items-center gap-2 pl-2 border-l border-gray-200 dark:border-gray-600">
                        <button @click="profileDropdown=!profileDropdown" class="flex items-center gap-2"><div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-white text-sm font-medium" x-text="user.email?.charAt(0)?.toUpperCase()"></div><span class="text-sm text-gray-700 dark:text-gray-200 hidden sm:block" x-text="user.email?.split('@')[0]"></span></button>
                        <div x-show="profileDropdown" @click.away="profileDropdown=false" x-cloak class="absolute right-0 top-full mt-1 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50 py-1">

                        <a href="#/payments" @click.prevent="window.location.hash='#/payments'" class="inline-flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 hover:text-indigo-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>

                    <!-- 생성 폼 -->

                                        <span class="text-sm text-gray-700 dark:text-gray-300">외주 (Outsourcing)</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" x-model="projectType" value="internal" class="text-indigo-600 focus:ring-indigo-500">

                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">프로젝트 범위 설명 *</label>
                                <textarea x-model="scopeDescription" rows="4" maxlength="1000" placeholder="프로젝트의 범위, 주요 기능, 기술 스택 등을 상세히 설명하세요. (최소 10자)" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>

                            </div>
                            <button @click="generate()" :disabled="generating" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                                <svg x-show="generating" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                <svg x-show="!generating" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                <span x-text="generating ? 'AI 분석 중...' : 'AI 견적 생성'"></span>
                            </button>
                        </div>
                    </div>

                    <!-- 결과 -->
                    <template x-if="result">
                        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                            <!-- 결과 헤더 -->
                            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
                                <h3 class="text-sm font-semibold text-gray-900 dark:text-white">견적 결과</h3>
                                <button @click="openExport()" class="inline-flex items-center gap-2 px-3 py-1.5 bg-green-600 text-white text-xs font-medium rounded-lg hover:bg-green-700">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    Google Sheet 내보내기
                                </button>
                            </div>

                            <!-- 요약 -->
                            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 px-6 py-4 bg-gray-50 dark:bg-gray-700/30">
                                <div>

                                    <p class="text-lg font-bold text-indigo-600 dark:text-indigo-400" x-text="fmtAmount(result.total_amount)+'원'"></p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 dark:text-gray-400">예상 기간</p>

                                <div>

                                    <p class="text-lg font-bold text-gray-900 dark:text-white" x-text="result.items.length+'개'"></p>
                                </div>
                            </div>

                            <!-- 항목 테이블 -->
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead class="bg-gray-50 dark:bg-gray-700/50">

                                            <th class="px-4 py-3 text-left font-medium text-gray-500 dark:text-gray-400">항목</th>
                                            <th class="px-4 py-3 text-left font-medium text-gray-500 dark:text-gray-400">설명</th>
                                            <th class="px-4 py-3 text-center font-medium text-gray-500 dark:text-gray-400">수량</th>
                                            <th class="px-4 py-3 text-center font-medium text-gray-500 dark:text-gray-400">단위</th>
                                            <th class="px-4 py-3 text-right font-medium text-gray-500 dark:text-gray-400">단가</th>
                                            <th class="px-4 py-3 text-right font-medium text-gray-500 dark:text-gray-400">금액</th>
                                            <th class="px-4 py-3 text-center font-medium text-gray-500 dark:text-gray-400">소요일</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                                        <template x-for="(item, idx) in result.items" :key="idx">
                                            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                                                <td class="px-4 py-3 font-medium text-gray-900 dark:text-white" x-text="item.name"></td>
                                                <td class="px-4 py-3 text-gray-600 dark:text-gray-400 max-w-[200px] truncate" x-text="item.description||'-'"></td>
                                                <td class="px-4 py-3 text-center text-gray-600 dark:text-gray-400" x-text="item.quantity"></td>
                                                <td class="px-4 py-3 text-center text-gray-600 dark:text-gray-400" x-text="item.unit"></td>
                                                <td class="px-4 py-3 text-right text-gray-600 dark:text-gray-400 whitespace-nowrap" x-text="fmtAmount(item.unit_price)+'원'"></td>
                                                <td class="px-4 py-3 text-right font-medium text-gray-900 dark:text-white whitespace-nowrap" x-text="fmtAmount(item.amount)+'원'"></td>
                                                <td class="px-4 py-3 text-center text-gray-600 dark:text-gray-400" x-text="item.estimated_days+'일'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                    <tfoot class="bg-gray-50 dark:bg-gray-700/50">
                                        <tr>
                                            <td colspan="5" class="px-4 py-3 text-right font-bold text-gray-900 dark:text-white">합계</td>
                                            <td class="px-4 py-3 text-right font-bold text-indigo-600 dark:text-indigo-400 whitespace-nowrap" x-text="fmtAmount(result.total_amount)+'원'"></td>
                                            <td class="px-4 py-3 text-center font-bold text-gray-900 dark:text-white" x-text="result.estimated_duration_days+'일'"></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>

                            <!-- 비고 & 참조 프로젝트 -->
                            <template x-if="result.notes || (result.reference_projects && result.reference_projects.length)">
                                <div class="px-6 py-4 border-t border-gray-100 dark:border-gray-700 space-y-3">
                                    <template x-if="result.notes">
                                        <div>
                                            <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">비고</p>
                                            <p class="text-sm text-gray-700 dark:text-gray-300" x-text="result.notes"></p>
                                        </div>
                                    </template>
                                    <template x-if="result.reference_projects && result.reference_projects.length">
                                        <div>
                                            <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">참조 프로젝트</p>
                                            <div class="flex flex-wrap gap-2">
                                                <template x-for="ref in result.reference_projects" :key="ref">
                                                    <span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 text-xs rounded" x-text="ref"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Google Sheet 내보내기 모달 -->
                    <div x-show="showExportModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
                        <div class="absolute inset-0 bg-black bg-opacity-50" @click="showExportModal=false"></div>
                        <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6">
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Google Sheet 내보내기</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">프로젝트 *</label>
                                    <div x-data="searchDropdown({endpoint:'/projects',listKey:'projects',valueKey:'id',labelKey:'project_name',placeholder:'프로젝트 검색...',modelValue:selectedProjectId,onSelect(p){selectedProjectId=p.id||''}})" x-init="init()" class="relative">
                                        <button @click="open=!open;if(open){$nextTick(()=>$refs.si.focus());search('')}" type="button" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-left flex items-center justify-between"><span x-text="displayText" :class="selectedId?'text-gray-900 dark:text-white':'text-gray-400 dark:text-gray-500'"></span><span class="flex items-center gap-1 ml-1 flex-shrink-0"><span x-show="selectedId" @click.stop="clear()" class="text-gray-400 hover:text-red-500 cursor-pointer text-base leading-none">&times;</span><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span></button>
                                        <div x-show="open" x-cloak @click.away="open=false" class="absolute z-[80] mt-1 w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg max-h-60 overflow-hidden">
                                            <div class="p-2 border-b border-gray-100 dark:border-gray-700"><input x-ref="si" x-model="query" @input="doSearch()" type="text" placeholder="프로젝트명 검색..." class="w-full px-2 py-1.5 text-sm border border-gray-200 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-700"></div>
                                            <div class="overflow-y-auto max-h-48">
                                                <template x-if="loading"><div class="px-3 py-2 text-sm text-gray-400">검색 중...</div></template>
                                                <template x-if="!loading&&items.length===0"><div class="px-3 py-2 text-sm text-gray-400">결과 없음</div></template>
                                                <template x-for="item in items" :key="item.id"><div @click="select(item)" class="px-3 py-2 text-sm cursor-pointer hover:bg-indigo-50 dark:hover:bg-gray-700" :class="item.id==selectedId?'bg-indigo-50 dark:bg-gray-700 text-indigo-600 dark:text-indigo-400':''"><span x-text="item.project_name"></span></div></template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">문서 제목</label>
                                    <input type="text" x-model="exportTitle" maxlength="200" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-indigo-500">
                                </div>
                            </div>
                            <div class="flex justify-end gap-3 mt-6">
                                <button @click="showExportModal=false" class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">취소</button>
                                <button @click="exportSheet()" :disabled="exporting" class="px-5 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 flex items-center gap-2">
                                    <svg x-show="exporting" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                    <span x-text="exporting ? '내보내는 중...' : '내보내기'"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ======== 템플릿 + 반복업무 페이지 ======== -->
            <template x-if="currentPage==='templates'">
                <div x-data="templatePage()" x-init="init()">
                    <!-- 헤더 -->
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                        <div>
                            <h2 class="text-xl font-bold text-gray-900 dark:text-white">템플릿 관리</h2>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">프로젝트 템플릿과 반복 업무를 관리합니다.</p>
                        </div>
                    </div>

                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    새 템플릿
                                </button>
                            </div>

                            <!-- 빈 상태 -->
                            <template x-if="templates.length===0">
                                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-center py-16">
                                    <svg class="w-12 h-12 text-gray-300 dark:text-gray-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6z"/></svg>
                                    <p class="text-gray-400 dark:text-gray-500 text-sm">등록된 템플릿이 없습니다.</p>
                                    <button @click="openCreateTpl()" class="mt-3 text-sm text-indigo-600 hover:underline">첫 템플릿 만들기</button>
                                </div>
                            </template>

                            <!-- 템플릿 카드 그리드 -->
                            <template x-if="templates.length>0">
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    <template x-for="t in templates" :key="t.id">
                                        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-5 hover:shadow-md transition-shadow">
                                            <div class="flex items-start justify-between mb-3">
                                                <div class="flex-1 min-w-0">
                                                    <h3 class="font-semibold text-gray-900 dark:text-white truncate" x-text="t.name"></h3>
                                                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium rounded-full" :class="getProjectTypeBadge(t.project_type)" x-text="getProjectTypeLabel(t.project_type)"></span>
                                                    <span x-show="t.team_id" class="inline-block mt-1 ml-1 px-2 py-0.5 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300" x-text="getTeamName(t.team_id)"></span>
                                                </div>
                                                <div class="flex items-center gap-1 ml-2">
                                                    <button @click="viewDetail(t)" class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 hover:text-gray-600" title="상세보기">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                                    </button>
                                                    <button @click="openEditTpl(t)" class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 hover:text-indigo-600" title="수정">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                                    </button>
                                                    <button @click="deleteTpl(t)" class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 hover:text-red-600" title="삭제">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                                    </button>
                                                </div>
                                            </div>
                                            <p x-show="t.description" class="text-sm text-gray-500 dark:text-gray-400 mb-3 line-clamp-2" x-text="t.description"></p>
                                            <div class="flex items-center gap-4 text-xs text-gray-400 dark:text-gray-500">
                                                <span class="flex items-center gap-1">
                                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                                                    업무 <span x-text="(t.task_templates||[]).length"></span>개
                                                </span>
                                                <span class="flex items-center gap-1">
                                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                                    일정 <span x-text="(t.schedule_templates||[]).length"></span>개
                                                </span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg><span class="text-[10px]">발주처</span>
            </a>
            <a href="#/projects" @click.prevent="navigate('/projects')" class="flex flex-col items-center gap-0.5 px-3 py-1" :class="currentPage==='projects'||currentPage==='projectDetail'?'text-indigo-600 dark:text-indigo-400':'text-gray-400'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><span class="text-[10px]">프로젝트</span>
            </a>
            <a href="#/tasks" @click.prevent="navigate('/tasks')" class="flex flex-col items-center gap-0.5 px-3 py-1" :class="currentPage==='tasks'?'text-indigo-600 dark:text-indigo-400':'text-gray-400'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span class="text-[10px]">업무</span>
            </a>
        </div>
    </nav>

<!-- 인증 모달 -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-[70] flex items-center justify-center bg-black bg-opacity-50" @click.self="closeModal()">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm mx-4 p-6 relative" @click.stop>
            <!-- 로그인 -->
            <template x-if="modalMode==='login'">
                <div>
                    <h3 class="text-lg font-semibold text-center mb-5">로그인</h3>
                    <div x-show="formError" class="mb-3 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400" x-text="formError"></div>
                    <div class="space-y-3">
                        <div><label class="block text-sm font-medium mb-1">이메일</label><input type="email" x-model="email" @keydown.enter="login()" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500" placeholder="이메일을 입력하세요"></div>
                        <div class="relative"><label class="block text-sm font-medium mb-1">비밀번호</label><input :type="showPassword?'text':'password'" x-model="password" @keydown.enter="login()" class="w-full px-3 py-2 pr-10 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호를 입력하세요"><button @click="showPassword=!showPassword" type="button" class="absolute right-3 top-8 text-gray-400 hover:text-gray-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button></div>
                    </div>
                    <button @click="login()" :disabled="formLoading" class="w-full mt-5 px-4 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors" x-text="formLoading?'로그인 중...':'로그인'"></button>
                    <p class="text-center text-sm text-gray-500 mt-4">계정이 없으신가요? <button @click="modalMode='signup';formError=''" class="text-indigo-600 hover:underline font-medium">회원가입</button></p>
                </div>
            </template>
            <!-- 회원가입 -->
            <template x-if="modalMode==='signup'">
                <div>
                    <h3 class="text-lg font-semibold text-center mb-5">회원가입</h3>
                    <div x-show="formError" class="mb-3 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400" x-text="formError"></div>
                    <div x-show="formSuccess" class="mb-3 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg text-sm text-green-600 dark:text-green-400" x-text="formSuccess"></div>
                    <div class="space-y-3">
                        <div><label class="block text-sm font-medium mb-1">이메일</label><div class="flex gap-2"><input type="email" x-model="email" :disabled="emailVerified" class="flex-1 px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 disabled:opacity-60"><button @click="sendVerificationCode()" :disabled="formLoading||emailVerified" class="px-3 py-2 text-sm border border-indigo-300 text-indigo-600 rounded-lg hover:bg-indigo-50 disabled:opacity-50 whitespace-nowrap" x-text="emailVerified?'인증완료':'인증코드 발송'"></button></div></div>
                        <template x-if="!emailVerified">
                            <div><label class="block text-sm font-medium mb-1">비밀번호</label><p class="text-xs text-gray-400 mb-2">먼저 이메일 인증을 완료해주세요.</p></div>
                        </template>
                        <template x-if="emailVerified">
                            <div class="space-y-3">
                                <div><label class="block text-sm font-medium mb-1">비밀번호</label><input type="password" x-model="password" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700" placeholder="8자 이상, 영문+숫자">
                                    <div x-show="password" class="mt-1"><div class="h-1.5 bg-gray-200 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all" :class="passwordStrength.color" :style="'width:'+passwordStrength.width"></div></div><span class="text-xs" :class="{'text-red-500':passwordStrength.score<=2,'text-yellow-500':passwordStrength.score<=4,'text-green-500':passwordStrength.score>4}" x-text="passwordStrength.label"></span></div>
                                </div>
                                <div><label class="block text-sm font-medium mb-1">비밀번호 확인</label><input type="password" x-model="passwordConfirm" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"></div>
                            </div>
                        </template>
                    </div>
                    <button @click="signup()" :disabled="formLoading||!emailVerified" class="w-full mt-5 px-4 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50" x-text="formLoading?'처리 중...':'회원가입'"></button>
                    <p class="text-center text-sm text-gray-500 mt-4">이미 계정이 있으신가요? <button @click="modalMode='login';formError='';formSuccess=''" class="text-indigo-600 hover:underline font-medium">로그인</button></p>
                </div>
            </template>
            <!-- 이메일 인증 -->
            <template x-if="modalMode==='verify'">
                <div>
                    <h3 class="text-lg font-semibold text-center mb-2">이메일 인증</h3>
                    <p class="text-sm text-gray-500 text-center mb-5"><span x-text="email"></span>으로 발송된 코드를 입력하세요.</p>
                    <div x-show="formError" class="mb-3 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 rounded-lg text-sm text-red-600" x-text="formError"></div>
                    <div x-show="formSuccess" class="mb-3 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 rounded-lg text-sm text-green-600" x-text="formSuccess"></div>
                    <div><label class="block text-sm font-medium mb-1">인증코드</label><input type="text" x-model="verificationCode" @keydown.enter="verifyCode()" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-center tracking-widest text-lg" maxlength="6" placeholder="000000"></div>
                    <button @click="verifyCode()" :disabled="formLoading" class="w-full mt-5 px-4 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50" x-text="formLoading?'확인 중...':'인증 확인'"></button>
                    <button @click="sendVerificationCode()" class="w-full mt-2 text-sm text-indigo-600 hover:underline">코드 재발송</button>
                </div>
            </template>
            <button @click="closeModal()" class="absolute top-4 right-4 p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
    </div>

</div>
</body>
</html>
