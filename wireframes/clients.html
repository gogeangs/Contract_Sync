<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contract Sync v2 - 발주처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

<div x-data="appLayout()" class="flex h-screen overflow-hidden">

  <!-- 좌측 사이드바 -->
  <aside class="hidden lg:flex lg:flex-col w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 fixed inset-y-0 left-0 z-30">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-200 dark:border-gray-700">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <span class="text-lg font-bold text-gray-800 dark:text-white">Contract Sync</span>
    </div>
    <div class="px-4 py-3">
      <div class="w-full flex items-center justify-between px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 rounded-lg">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="text-gray-700 dark:text-gray-200">디자인팀</span>
        </div>
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </div>
    </div>
    <nav class="flex-1 px-3 py-2 space-y-1 overflow-y-auto">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>대시보드</span>
      </a>
      <a href="clients.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        <span>발주처</span>
      </a>
      <a href="projects.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        <span>프로젝트</span>
      </a>
      <a href="tasks.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        <span>업무</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span>보고서</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span>수금</span>
      </a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 dark:border-gray-700">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span>설정</span>
      </a>
    </div>
  </aside>

  <!-- 메인 영역 -->
  <div class="flex-1 flex flex-col lg:ml-64 overflow-hidden">
    <!-- 상단 헤더 -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 lg:px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <button @click="mobileMenu = !mobileMenu" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-lg font-semibold hidden sm:block">발주처</h1>
      <div class="flex items-center gap-2">
        <button class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[10px] rounded-full flex items-center justify-center">3</span>
        </button>
        <button @click="toggleDark()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg x-show="!darkMode" class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg x-show="darkMode" x-cloak class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <div class="flex items-center gap-2 pl-2 border-l border-gray-200 dark:border-gray-600">
          <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-white text-sm font-medium">홍</div>
          <span class="text-sm text-gray-700 dark:text-gray-200 hidden sm:block">홍길동</span>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6" x-data="clientsPage()">

      <!-- 검색/필터/액션 바 -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
        <div class="flex flex-1 items-center gap-3">
          <!-- 검색 -->
          <div class="relative flex-1 max-w-md">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" x-model="search" placeholder="발주처명, 담당자 검색..." class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400">
          </div>
          <!-- 업종 필터 -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-gray-700 bg-white dark:bg-gray-800">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
              <span x-text="categoryFilter || '업종'" class="text-gray-700 dark:text-gray-300"></span>
            </button>
            <div x-show="open" @click.away="open = false" x-cloak class="absolute top-full left-0 mt-1 w-40 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 z-50">
              <button @click="categoryFilter = ''; open = false" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 rounded-t-lg text-gray-700 dark:text-gray-200">전체</button>
              <template x-for="cat in ['IT서비스', '컨설팅', '제조', '건설', '디자인']" :key="cat">
                <button @click="categoryFilter = cat; open = false" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200" x-text="cat"></button>
              </template>
            </div>
          </div>
          <!-- 정렬 -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-gray-700 bg-white dark:bg-gray-800">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
              <span class="text-gray-700 dark:text-gray-300 hidden sm:inline">정렬</span>
            </button>
            <div x-show="open" @click.away="open = false" x-cloak class="absolute top-full right-0 mt-1 w-36 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 z-50">
              <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 rounded-t-lg text-gray-700 dark:text-gray-200">최근순</button>
              <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200">거래액순</button>
              <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 rounded-b-lg text-gray-700 dark:text-gray-200">이름순</button>
            </div>
          </div>
        </div>
        <!-- 새 발주처 버튼 -->
        <button @click="showCreateModal = true" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span>새 발주처</span>
        </button>
      </div>

      <!-- 발주처 카드 그리드 -->
      <div x-show="filteredClients.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <template x-for="client in filteredClients" :key="client.id">
          <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-5 hover:shadow-md hover:border-indigo-200 dark:hover:border-indigo-800 transition-all group">
            <a :href="'client-detail.html?id=' + client.id" class="absolute inset-0 z-0 rounded-lg"></a>
            <div class="relative z-10 pointer-events-none">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/40 rounded-lg flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold text-sm" x-text="client.name.charAt(0)"></div>
                <div>
                  <h3 class="font-semibold text-gray-800 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors" x-text="client.name"></h3>
                  <p class="text-xs text-gray-500 dark:text-gray-400" x-text="client.category"></p>
                </div>
              </div>
              <div class="flex items-center gap-2 pointer-events-auto">
                <span class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400" x-text="'프로젝트 ' + client.projectCount + '건'"></span>
                <button @click.prevent.stop="confirmDelete(client)" class="p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors"
                  :class="client.projectCount === 0 ? 'text-gray-400 hover:text-red-500' : 'text-gray-200 dark:text-gray-600 cursor-not-allowed'"
                  :disabled="client.projectCount !== 0" :title="client.projectCount !== 0 ? '진행중 프로젝트가 있어 삭제할 수 없습니다' : '삭제'">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
            </div>

            <div class="space-y-2 mb-4">
              <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span x-text="client.contactName"></span>
              </div>
              <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span class="truncate" x-text="client.email"></span>
              </div>
              <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                <span x-text="client.phone"></span>
              </div>
            </div>

            <div class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 mb-3">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span>최근 거래: <span x-text="client.lastProjectDate"></span></span>
            </div>

            <div class="border-t border-gray-100 dark:border-gray-700 pt-3">
              <div class="grid grid-cols-3 gap-2 text-center">
                <div>
                  <p class="text-xs text-gray-500 dark:text-gray-400">거래액</p>
                  <p class="text-sm font-semibold text-gray-800 dark:text-white" x-text="client.totalAmount"></p>
                </div>
                <div>
                  <p class="text-xs text-gray-500 dark:text-gray-400">수금</p>
                  <p class="text-sm font-semibold text-green-600 dark:text-green-400" x-text="client.paidAmount"></p>
                </div>
                <div>
                  <p class="text-xs text-gray-500 dark:text-gray-400">미수금</p>
                  <p class="text-sm font-semibold text-red-600 dark:text-red-400" x-text="client.unpaidAmount"></p>
                </div>
              </div>
            </div>
            </div>
          </div>
        </template>
      </div>

      <!-- 삭제 확인 모달 -->
      <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div @click="showDeleteModal = false" class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-sm p-6" @click.stop>
          <div class="flex flex-col items-center text-center">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mb-4">
              <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">발주처 삭제</h3>
            <p class="text-sm text-gray-600 dark:text-gray-400 mb-1"><span class="font-medium text-gray-800 dark:text-gray-200" x-text="deleteTarget?.name"></span>을(를) 삭제하시겠습니까?</p>
            <p class="text-xs text-red-500 mb-6">이 작업은 되돌릴 수 없습니다.</p>
            <div class="flex gap-3 w-full">

<script>
function appLayout() {
  return {
    mobileMenu: false,
    darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches,
    init() { this.applyDark(); },
    toggleDark() { this.darkMode = !this.darkMode; localStorage.setItem('darkMode', this.darkMode); this.applyDark(); },
    applyDark() { document.documentElement.classList.toggle('dark', this.darkMode); }
  }
}

function clientsPage() {
  return {
    search: '',
    categoryFilter: '',
    showCreateModal: false,
    clients: [
      { id: 1, name: '(주)ABC테크', contactName: '김대표', email: 'kim@abctech.com', phone: '02-1234-5678', category: 'IT서비스', projectCount: 3, totalAmount: '1.2억', paidAmount: '8,000만', unpaidAmount: '4,000만', lastProjectDate: '2026-02-28' },
      { id: 2, name: '(주)디자인플러스', contactName: '이사장', email: 'lee@designplus.kr', phone: '02-9876-5432', category: '디자인', projectCount: 2, totalAmount: '5,500만', paidAmount: '3,500만', unpaidAmount: '2,000만', lastProjectDate: '2026-02-15' },
      { id: 3, name: '한국컨설팅', contactName: '박상무', email: 'park@krconsult.co.kr', phone: '02-5555-1234', category: '컨설팅', projectCount: 0, totalAmount: '3,000만', paidAmount: '3,000만', unpaidAmount: '0', lastProjectDate: '2025-12-20' },
      { id: 4, name: '미래건설(주)', contactName: '최부장', email: 'choi@mirae.com', phone: '031-222-3333', category: '건설', projectCount: 2, totalAmount: '2.5억', paidAmount: '1.5억', unpaidAmount: '1억', lastProjectDate: '2026-03-01' },
      { id: 5, name: '스마트제조', contactName: '정대리', email: 'jung@smartmfg.kr', phone: '032-444-5555', category: '제조', projectCount: 0, totalAmount: '7,000만', paidAmount: '4,000만', unpaidAmount: '3,000만', lastProjectDate: '2025-11-10' },
      { id: 6, name: '(주)넥스트솔루션', contactName: '강팀장', email: 'kang@nextsol.com', phone: '02-7777-8888', category: 'IT서비스', projectCount: 4, totalAmount: '2.1억', paidAmount: '1.8억', unpaidAmount: '3,000만', lastProjectDate: '2026-02-20' }
    ],
    showDeleteModal: false,
    deleteTarget: null,
    get filteredClients() {
      return this.clients.filter(c => {
        const matchSearch = !this.search || c.name.includes(this.search) || c.contactName.includes(this.search);
        const matchCategory = !this.categoryFilter || c.category === this.categoryFilter;
        return matchSearch && matchCategory;
      });
    },

    confirmDelete(client) {
      this.deleteTarget = client;
      this.showDeleteModal = true;
    },

    deleteClient() {
      if (this.deleteTarget && this.deleteTarget.projectCount === 0) {
        this.clients = this.clients.filter(c => c.id !== this.deleteTarget.id);
      }
      this.showDeleteModal = false;
      this.deleteTarget = null;
    }
  }
}
</script>
