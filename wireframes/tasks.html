          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>설정</span></a>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6" x-data="tasksPage()">

      <!-- 검색/필터/액션 바 -->
      <div class="flex flex-col gap-3 mb-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div class="relative flex-1 max-w-md">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" x-model="search" placeholder="업무명, 프로젝트명 검색..." class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex items-center gap-2">
            <!-- 뷰 전환 -->
            <div class="flex bg-gray-100 dark:bg-gray-700 rounded-lg p-0.5">
              <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-white dark:bg-gray-600 shadow-sm' : ''" class="p-1.5 rounded-md transition-all" title="리스트">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
              </button>
              <button @click="viewMode = 'kanban'" :class="viewMode === 'kanban' ? 'bg-white dark:bg-gray-600 shadow-sm' : ''" class="p-1.5 rounded-md transition-all" title="칸반">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
              </button>
              <button @click="viewMode = 'timeline'" :class="viewMode === 'timeline' ? 'bg-white dark:bg-gray-600 shadow-sm' : ''" class="p-1.5 rounded-md transition-all" title="타임라인">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
              </button>
            </div>
            <!-- 그룹핑 -->
            <div class="relative" x-data="{ open: false }">
              <button @click="open = !open" class="flex items-center gap-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-gray-700 bg-white dark:bg-gray-800">
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>

              </button>
              <div x-show="open" @click.away="open = false" x-cloak class="absolute top-full right-0 mt-1 w-36 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 z-50">

              </div>
            </div>

                      <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 text-orange-600 dark:text-orange-400">피드백 대기</button>
                    </div>
                  </div>
                  <!-- 프로젝트 이동 버튼 -->
                  <button @click="showMoveProject = !showMoveProject; moveTargetProject = ''" class="flex items-center gap-1.5 px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 bg-white dark:bg-gray-800 transition-colors" :class="showMoveProject ? 'border-amber-400 text-amber-700 dark:text-amber-400' : 'text-gray-700 dark:text-gray-300'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                    <span>프로젝트 이동</span>
                  </button>
                </div>
                <button x-show="selectedTask.isClientFacing && (selectedTask.status === 'completed' || selectedTask.status === 'confirmed')" class="px-4 py-2 text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors flex items-center gap-1.5">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  완료 보고
                </button>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- 페이지네이션 -->
      <div class="flex items-center justify-between mt-4">
        <span class="text-sm text-gray-500 dark:text-gray-400">총 <span x-text="filteredTasks.length"></span>건</span>
        <div class="flex items-center gap-1">
          <button class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-500">이전</button>
          <button class="px-3 py-1.5 text-sm bg-indigo-600 text-white rounded-lg">1</button>
          <button class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">2</button>
          <button class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-500">다음</button>
        </div>
      </div>

    </main>

    <!-- 모바일 하단 탭바 -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-30">
      <div class="flex justify-around py-2">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 px-3 py-1 text-gray-400 dark:text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span class="text-[11px]">대시보드</span></a>
        <a href="projects.html" class="flex flex-col items-center gap-1 px-3 py-1 text-gray-400 dark:text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><span class="text-[11px]">프로젝트</span></a>
        <a href="tasks.html" class="flex flex-col items-center gap-1 px-3 py-1 text-indigo-600 dark:text-indigo-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span class="text-[10px] font-medium">업무</span></a>
        <button class="flex flex-col items-center gap-1 px-3 py-1 text-gray-400 dark:text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg><span class="text-[11px]">더보기</span></button>
      </div>
    </nav>
  </div>
</div>

<script>
function appLayout() {
  return {
    mobileMenu: false,
    darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches,
    init() { this.applyDark(); },
    toggleDark() { this.darkMode = !this.darkMode; localStorage.setItem('darkMode', this.darkMode); this.applyDark(); },
    applyDark() { document.documentElement.classList.toggle('dark', this.darkMode); }
  }
}

function tasksPage() {
  return {
    search: '',
    viewMode: 'list',
    groupBy: 'none',
    sortBy: 'dueDate',
    statusFilter: '전체',
    priorityFilter: '',
    assigneeFilter: '',
    showCreateModal: false,
    showDetailModal: false,
    selectedTask: null,
    showMoveProject: false,
    moveTargetProject: '',

    // 칸반 칼럼 정의
    kanbanColumns: [
      { status: 'pending', label: '대기', dotColor: 'bg-gray-400' },
      { status: 'in_progress', label: '진행중', dotColor: 'bg-blue-500' },
      { status: 'completed', label: '완료', dotColor: 'bg-green-500' },
      { status: 'feedback', label: '피드백', dotColor: 'bg-orange-500' }
    ],
    tasks: [
      { id: 1, code: 'TASK-001', name: 'API 설계서 작성', project: 'OO시스템 구축', client: 'ABC테크', priority: '높음', dueDate: '03/05', assignee: '홍길동', status: 'in_progress', statusLabel: '진행중', isClientFacing: true, isOverdue: false, barStart: 7, barWidth: 28 },
      { id: 2, code: 'TASK-002', name: '화면설계서 검토', project: 'OO시스템 구축', client: 'ABC테크', priority: '긴급', dueDate: '03/03', assignee: '김개발', status: 'feedback_pending', statusLabel: '피드백 대기', isClientFacing: true, isOverdue: true, barStart: 0, barWidth: 21 },
      { id: 3, code: 'TASK-003', name: 'DB 마이그레이션', project: '웹사이트 리뉴얼', client: '디자인플러스', priority: '보통', dueDate: '03/10', assignee: '박프론', status: 'pending', statusLabel: '대기', isClientFacing: false, isOverdue: false, barStart: 35, barWidth: 21 },
      { id: 4, code: 'TASK-004', name: '프론트엔드 개발', project: 'OO시스템 구축', client: 'ABC테크', priority: '높음', dueDate: '03/30', assignee: '홍길동', status: 'in_progress', statusLabel: '진행중', isClientFacing: false, isOverdue: false, barStart: 14, barWidth: 64 },
      { id: 5, code: 'TASK-005', name: '결과보고서 작성', project: '모바일 앱', client: 'ABC테크', priority: '보통', dueDate: '03/07', assignee: '이테스', status: 'completed', statusLabel: '완료', isClientFacing: true, isOverdue: false, barStart: 0, barWidth: 42 },
      { id: 6, code: 'TASK-006', name: '디자인 시안 확인', project: '웹사이트 리뉴얼', client: '디자인플러스', priority: '낮음', dueDate: '03/15', assignee: '김개발', status: 'report_sent', statusLabel: '보고 발송', isClientFacing: true, isOverdue: false, barStart: 21, barWidth: 35 },
      { id: 7, code: 'TASK-007', name: '서버 환경 구축', project: '모바일 앱', client: 'ABC테크', priority: '긴급', dueDate: '03/02', assignee: '박프론', status: 'confirmed', statusLabel: '확인됨', isClientFacing: false, isOverdue: true, barStart: 0, barWidth: 14 },
      { id: 8, code: 'TASK-008', name: 'QA 테스트 진행', project: 'OO시스템 구축', client: 'ABC테크', priority: '보통', dueDate: '04/10', assignee: '이테스', status: 'pending', statusLabel: '대기', isClientFacing: false, isOverdue: false, barStart: 50, barWidth: 50 },
      { id: 9, code: 'TASK-009', name: '로고 디자인 수정', project: '웹사이트 리뉴얼', client: '디자인플러스', priority: '높음', dueDate: '03/08', assignee: '홍길동', status: 'revision_requested', statusLabel: '수정 요청', isClientFacing: true, isOverdue: false, barStart: 14, barWidth: 28 },
      { id: 10, code: 'TASK-010', name: '서버 모니터링 설정', project: '서버 유지보수', client: '넥스트솔루션', priority: '보통', dueDate: '03/20', assignee: '박프론', status: 'in_progress', statusLabel: '진행중', isClientFacing: false, isOverdue: false, barStart: 28, barWidth: 42 },
      { id: 11, code: 'TASK-011', name: '데이터 백업 자동화', project: '서버 유지보수', client: '넥스트솔루션', priority: '높음', dueDate: '03/12', assignee: '김개발', status: 'pending', statusLabel: '대기', isClientFacing: false, isOverdue: false, barStart: 21, barWidth: 35 },
      { id: 12, code: 'TASK-012', name: '사용자 매뉴얼 작성', project: 'OO시스템 구축', client: 'ABC테크', priority: '낮음', dueDate: '04/30', assignee: '이테스', status: 'pending', statusLabel: '대기', isClientFacing: true, isOverdue: false, barStart: 64, barWidth: 36 }
    ],
    get filteredTasks() {
      let result = this.tasks.filter(t => {
        const matchSearch = !this.search || t.name.includes(this.search) || t.project.includes(this.search) || t.code.includes(this.search);
        const matchStatus = this.statusFilter === '전체' ||
          (this.statusFilter === '대기' && t.status === 'pending') ||
          (this.statusFilter === '진행중' && t.status === 'in_progress') ||
          (this.statusFilter === '완료' && (t.status === 'completed' || t.status === 'confirmed')) ||
          (this.statusFilter === '피드백대기' && (t.status === 'feedback_pending' || t.status === 'report_sent' || t.status === 'revision_requested'));
        const matchPriority = !this.priorityFilter || t.priority === this.priorityFilter;
        const matchAssignee = !this.assigneeFilter || t.assignee === this.assigneeFilter;
        return matchSearch && matchStatus && matchPriority && matchAssignee;
      });
      // 정렬
      const priorityOrder = { '긴급': 0, '높음': 1, '보통': 2, '낮음': 3 };
      if (this.sortBy === 'dueDate') {
        result = [...result].sort((a, b) => a.dueDate.localeCompare(b.dueDate));
      } else if (this.sortBy === 'priority') {
        result = [...result].sort((a, b) => (priorityOrder[a.priority] ?? 9) - (priorityOrder[b.priority] ?? 9));
      } else if (this.sortBy === 'latest') {
        result = [...result].sort((a, b) => b.id - a.id);
      }
      return result;
    },
    get groupedByProject() {
      const groups = {};
      this.filteredTasks.forEach(t => {
        if (!groups[t.project]) groups[t.project] = [];
        groups[t.project].push(t);
      });
      return Object.keys(groups).map(name => ({ name, tasks: groups[name] }));
    },
    get groupedByClient() {
      const groups = {};
      this.filteredTasks.forEach(t => {
        if (!groups[t.client]) groups[t.client] = [];
        groups[t.client].push(t);
      });
      return Object.keys(groups).map(name => ({ name, tasks: groups[name] }));
    },
    getPriorityClass(p) {
      return { '\uae34\uae09': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400', '\ub192\uc74c': 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400', '\ubcf4\ud1b5': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400', '\ub0ae\uc74c': 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400' }[p] || '';
    },
    getStatusClass(s) {
      return { 'pending': 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400', 'in_progress': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400', 'completed': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400', 'report_sent': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400', 'feedback_pending': 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400', 'confirmed': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400', 'revision_requested': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400' }[s] || '';
    },
    getKanbanTasks(colStatus) {
      return this.filteredTasks.filter(t => {
        if (colStatus === 'pending') return t.status === 'pending';
        if (colStatus === 'in_progress') return t.status === 'in_progress';
        if (colStatus === 'completed') return t.status === 'completed' || t.status === 'confirmed';
        if (colStatus === 'feedback') return t.status === 'report_sent' || t.status === 'feedback_pending' || t.status === 'revision_requested';
        return false;
      });
    },
    moveTaskToProject() {
      if (this.selectedTask && this.moveTargetProject) {
        this.selectedTask.project = this.moveTargetProject;
        this.showMoveProject = false;
        this.moveTargetProject = '';
      }
    },
    getTimelineBarClass(s) {
      return { 'pending': 'bg-gray-400', 'in_progress': 'bg-blue-500', 'completed': 'bg-green-500', 'report_sent': 'bg-purple-500', 'feedback_pending': 'bg-orange-500', 'confirmed': 'bg-emerald-600', 'revision_requested': 'bg-red-500' }[s] || 'bg-gray-400';
    }
  }
}
</script>
</body>
</html>
