<!DOCTYPE html>

    <!-- 팀 선택 -->

        <button @click="open = !open" class="w-full flex items-center justify-between px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">

            <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span class="text-gray-700 dark:text-gray-200">디자인팀</span>
          </div>

        </button>
        <div x-show="open" @click.away="open = false" x-cloak class="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-700 rounded-lg shadow-lg border border-gray-200 dark:border-gray-600 z-50">

          <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-600 rounded-b-lg text-gray-700 dark:text-gray-200">마케팅팀</button>

      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>

    <!-- 상단 헤더 -->

      </button>

      <div class="flex items-center gap-4">
        <h1 class="text-lg font-semibold hidden sm:block">프로젝트</h1>
      </div>

      <div class="flex items-center gap-2">
        <!-- 알림 -->
        <button class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">

        </button>
        <!-- 프로필 -->
        <div class="flex items-center gap-2 pl-2 border-l border-gray-200 dark:border-gray-600">
          <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-white text-sm font-medium">홍</div>
          <span class="text-sm text-gray-700 dark:text-gray-200 hidden sm:block">홍길동</span>
        </div>
      </div>

      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <span class="text-lg font-bold">Contract Sync</span>
        </div>
        <button @click="mobileMenu = false" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="px-3 py-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span>대시보드</span>
        </a>
        <a href="clients.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          <span>발주처</span>
        </a>
        <a href="projects.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-medium text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          <span>프로젝트</span>
        </a>
        <a href="tasks.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span>업무</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span>보고서</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>수금</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6 pb-20 lg:pb-6" x-data="projectsPage()">

      <!-- 검색/필터/액션 바 -->
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-4 mb-6">
        <div class="flex flex-col lg:flex-row lg:items-center gap-3">
          <!-- 검색바 -->
          <div class="relative flex-1 min-w-0">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" x-model="searchQuery" placeholder="프로젝트명, 발주처명 검색..." class="w-full pl-10 pr-4 py-2 text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-transparent">
          </div>

          <!-- 필터 드롭다운들 -->
          <div class="flex flex-wrap items-center gap-2">
            <!-- 유형 필터 -->
            <select x-model="filterType" class="text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400">
              <option value="전체">유형: 전체</option>
              <option value="외주">외주</option>
              <option value="내부">내부</option>
              <option value="유지보수">유지보수</option>
            </select>

            <!-- 상태 필터 -->
            <select x-model="filterStatus" class="text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400">
              <option value="전체">상태: 전체</option>
              <option value="기획중">기획중</option>
              <option value="진행중">진행중</option>
              <option value="보류">보류</option>
              <option value="완료">완료</option>
              <option value="취소">취소</option>
            </select>

            <!-- 발주처 필터 -->
            <select x-model="filterClient" class="text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400">
              <option value="전체">발주처: 전체</option>
              <option value="ABC테크">ABC테크</option>
              <option value="디자인플러스">디자인플러스</option>

              <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="projectType" value="외주" x-model="newProjectType" class="w-4 h-4 text-indigo-600 border-gray-300 dark:border-gray-600 focus:ring-indigo-500 dark:focus:ring-indigo-400">

                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="projectType" value="내부" x-model="newProjectType" class="w-4 h-4 text-indigo-600 border-gray-300 dark:border-gray-600 focus:ring-indigo-500 dark:focus:ring-indigo-400">
                  <span class="text-sm text-gray-700 dark:text-gray-300">내부</span>

                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="projectType" value="유지보수" x-model="newProjectType" class="w-4 h-4 text-indigo-600 border-gray-300 dark:border-gray-600 focus:ring-indigo-500 dark:focus:ring-indigo-400">

            </div>

            <!-- 기간 -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">기간</label>
              <div class="flex items-center gap-2">
                <input type="date" class="flex-1 px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-transparent">
                <span class="text-gray-400 dark:text-gray-500">~</span>
                <input type="date" class="flex-1 px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-transparent">

              <textarea rows="3" placeholder="프로젝트에 대한 간략한 설명을 입력하세요" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"></textarea>

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span class="text-[10px]">대시보드</span>

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span class="text-[10px]">업무</span>
        </a>
        <button class="flex flex-col items-center gap-1 px-3 py-1 text-gray-400 dark:text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
          <span class="text-[10px]">더보기</span>
        </button>
      </div>
    </nav>
  </div>
</div>

<script>
function appLayout() {
  return {
    mobileMenu: false,
    darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches,
    init() {
      this.applyDark();
    },
    toggleDark() {
      this.darkMode = !this.darkMode;
      localStorage.setItem('darkMode', this.darkMode);
      this.applyDark();
    },
    applyDark() {
      document.documentElement.classList.toggle('dark', this.darkMode);
    }
  }
}

function projectsPage() {
  return {
    searchQuery: '',
    filterType: '전체',
    filterStatus: '전체',
    filterClient: '전체',
    filterDateFrom: '',
    filterDateTo: '',
    sortBy: 'recent',
    showCreateModal: false,
    createMethod: 'direct',
    selectedTemplate: null,
    newProjectType: '외주',

    templates: [
      { id: 1, name: '웹 개발 프로젝트', desc: '프론트엔드/백엔드 표준 템플릿', icon: '🌐', tasks: 12, phases: '기획→설계→개발→테스트→배포' },
      { id: 2, name: '모바일 앱 개발', desc: 'iOS/Android 앱 개발 템플릿', icon: '📱', tasks: 15, phases: '기획→UI설계→개발→QA→출시' },
      { id: 3, name: '유지보수 계약', desc: '정기 유지보수 프로젝트 템플릿', icon: '🔧', tasks: 8, phases: '점검→수정→배포→보고' },
      { id: 4, name: 'SI 프로젝트', desc: '대규모 시스템 통합 템플릿', icon: '🏗️', tasks: 25, phases: '분석→설계→구축→이행→안정화' }
    ],

    projects: [
      {
        id: 1,
        name: 'OO시스템 구축',
        client: 'ABC테크',
        type: '외주',
        status: '진행중',
        period: '2026.01 ~ 2026.06',
        amount: '5,000만',
        amountNum: 50000000,
        progress: 35,
        startDate: '2026-01-01',
        endDate: '2026-06-30',
        createdAt: '2026-01-02'
      },
      {
        id: 2,
        name: '웹사이트 리뉴얼',
        client: '디자인플러스',
        type: '외주',
        status: '진행중',
        period: '2026.02 ~ 2026.05',
        amount: '4,000만',
        amountNum: 40000000,
        progress: 60,
        startDate: '2026-02-01',
        endDate: '2026-05-31',
        createdAt: '2026-02-01'
      },
      {
        id: 3,
        name: '내부 ERP 개선',
        client: '',
        type: '내부',
        status: '기획중',
        period: '2026.03 ~ 2026.08',
        amount: '',
        amountNum: 0,
        progress: 0,
        startDate: '2026-03-01',
        endDate: '2026-08-31',
        createdAt: '2026-02-15'
      },
      {
        id: 4,
        name: '모바일 앱 v2',
        client: 'ABC테크',
        type: '외주',
        status: '보류',
        period: '2026.04 ~ 2026.09',
        amount: '8,000만',
        amountNum: 80000000,
        progress: 15,
        startDate: '2026-04-01',
        endDate: '2026-09-30',
        createdAt: '2026-03-01'
      },
      {
        id: 5,
        name: '서버 유지보수',
        client: '넥스트솔루션',
        type: '유지보수',
        status: '진행중',
        period: '2026.01 ~ 2026.12',
        amount: '2,400만',
        amountNum: 24000000,
        progress: 50,
        startDate: '2026-01-01',
        endDate: '2026-12-31',
        createdAt: '2025-12-20'
      },
      {
        id: 6,
        name: '데이터 분석 플랫폼',
        client: '미래건설',
        type: '외주',
        status: '완료',
        period: '2025.06 ~ 2025.12',
        amount: '1.5억',
        amountNum: 150000000,
        progress: 100,
        startDate: '2025-06-01',
        endDate: '2025-12-31',
        createdAt: '2025-05-15'
      }
    ],

    get filteredProjects() {
      let result = this.projects;

      // 검색 필터
      if (this.searchQuery.trim()) {
        const q = this.searchQuery.trim().toLowerCase();
        result = result.filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.client && p.client.toLowerCase().includes(q))
        );
      }

      // 유형 필터
      if (this.filterType !== '전체') {
        result = result.filter(p => p.type === this.filterType);
      }

      // 상태 필터
      if (this.filterStatus !== '전체') {
        result = result.filter(p => p.status === this.filterStatus);
      }

      // 발주처 필터
      if (this.filterClient !== '전체') {
        result = result.filter(p => p.client === this.filterClient);
      }

      // 날짜 범위 필터
      if (this.filterDateFrom) {
        result = result.filter(p => p.endDate >= this.filterDateFrom);
      }
      if (this.filterDateTo) {
        result = result.filter(p => p.startDate <= this.filterDateTo);
      }

      // 정렬
      if (this.sortBy === 'recent') {
        result = [...result].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (this.sortBy === 'deadline') {
        result = [...result].sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
      } else if (this.sortBy === 'amount') {
        result = [...result].sort((a, b) => b.amountNum - a.amountNum);
      }

      return result;
    },

    getTypeBadgeClass(type) {
      return {
        '외주': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400',
        '내부': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
        '유지보수': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400'
      }[type] || '';
    },

    getStatusBadgeClass(status) {
      return {
        '기획중': 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400',
        '진행중': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
        '보류': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400',
        '완료': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
        '취소': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
      }[status] || '';
    }
  }
}
</script>
